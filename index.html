<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>MediTrack | Smart Medicine Reminder & Health Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    /* No white backgrounds anywhere - deep dark theme */
    body {
      background: radial-gradient(circle at 10% 20%, #0a0f2a 0%, #030617 100%);
      color: #e2e8f0;
    }
    /* Glass cards with dark rich colors */
    .glass-card {
      background: rgba(15, 25, 55, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(0, 255, 255, 0.2);
      box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5);
    }
    .btn-primary {
      background: linear-gradient(105deg, #00b4d8, #0077b6);
      box-shadow: 0 8px 20px rgba(0, 180, 216, 0.3);
      transition: all 0.2s ease;
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0, 180, 216, 0.5);
    }
    .sidebar-item {
      transition: all 0.2s ease;
      border-radius: 1rem;
    }
    .sidebar-item:hover {
      background: rgba(0, 180, 216, 0.2);
      transform: translateX(6px);
    }
    .card-hover {
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card-hover:hover {
      transform: translateY(-6px);
      box-shadow: 0 25px 40px -12px rgba(0, 180, 216, 0.3);
    }
    /* Force all inputs to have dark background and bright text */
    input, select, textarea {
      background-color: #0f172a !important;
      border: 1px solid #2dd4bf !important;
      color: #f1f5f9 !important;
      border-radius: 0.75rem;
      padding: 0.75rem;
    }
    input::placeholder, textarea::placeholder {
      color: #94a3b8 !important;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #00b4d8 !important;
      ring: 2px solid #00b4d8;
    }
    /* Date/time picker color fix */
    input[type="date"], input[type="time"] {
      color-scheme: dark;
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0f172a; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #00b4d8; border-radius: 10px; }
    .floating-chat {
      position: fixed;
      bottom: 25px;
      right: 25px;
      z-index: 50;
      background: linear-gradient(135deg, #00b4d8, #0077b6);
      box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
      transition: 0.2s;
    }
    .floating-chat:hover { transform: scale(1.08); }
    .chat-window {
      position: fixed;
      bottom: 100px;
      right: 25px;
      width: 350px;
      max-width: calc(100vw - 50px);
      height: 500px;
      background: rgba(10, 20, 40, 0.98);
      backdrop-filter: blur(20px);
      border-radius: 1.5rem;
      box-shadow: 0 25px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      z-index: 60;
      border: 1px solid rgba(0, 180, 216, 0.5);
    }
    @media (max-width: 640px) {
      .chat-window { width: 300px; right: 15px; bottom: 85px; height: 460px; }
    }
    .pulse {
      animation: pulse-ring 2s infinite;
    }
    @keyframes pulse-ring {
      0% { box-shadow: 0 0 0 0 rgba(0,180,216,0.5); }
      70% { box-shadow: 0 0 0 12px rgba(0,180,216,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,180,216,0); }
    }
    /* Rich text colors */
    .text-accent { color: #00b4d8; }
    .bg-accent { background: #00b4d8; }
  </style>
</head>
<body class="text-gray-200">

  <div id="appRoot" class="min-h-screen"></div>

  <script>
    // ----------------------------- STORAGE KEYS ---------------------------------
    const STORAGE_USERS = "meditrack_users_dark";
    const STORAGE_MEDICINES = "meditrack_medicines_dark";
    const STORAGE_HEALTH = "meditrack_health_dark";
    const STORAGE_MED_LOGS = "meditrack_medlogs_dark";
    let currentUser = null;
    let activeSection = "dashboard";
    let healthChart = null, complianceChart = null;

    function hashPassword(pwd) { return CryptoJS.SHA256(pwd).toString(); }
    function getUsers() { return JSON.parse(localStorage.getItem(STORAGE_USERS) || "[]"); }
    function saveUsers(users) { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
    function getMedicines() { return JSON.parse(localStorage.getItem(STORAGE_MEDICINES) || "[]"); }
    function saveMedicines(meds) { localStorage.setItem(STORAGE_MEDICINES, JSON.stringify(meds)); }
    function getHealthRecords() { return JSON.parse(localStorage.getItem(STORAGE_HEALTH) || "[]"); }
    function saveHealthRecords(records) { localStorage.setItem(STORAGE_HEALTH, JSON.stringify(records)); }
    function getMedicineLogs() { return JSON.parse(localStorage.getItem(STORAGE_MED_LOGS) || "[]"); }
    function saveMedicineLogs(logs) { localStorage.setItem(STORAGE_MED_LOGS, JSON.stringify(logs)); }

    function seedDemoData() {
      let users = getUsers();
      if (!users.find(u => u.email === "demo@meditrack.com")) {
        users.push({ id: "u1", name: "Dr. Sarah Johnson", email: "demo@meditrack.com", password: hashPassword("demo123"), profilePic: null, createdAt: new Date().toISOString() });
        saveUsers(users);
      }
      if (currentUser) {
        let meds = getMedicines();
        if (meds.filter(m => m.userId === currentUser.id).length === 0) {
          let sampleMeds = [
            { id: "med1", userId: currentUser.id, name: "Losartan", dosage: "50mg", frequency: "Daily", reminderTime: "08:00", startDate: "2026-01-01", endDate: "2026-12-31", notes: "Take with water, morning" },
            { id: "med2", userId: currentUser.id, name: "Metformin", dosage: "500mg", frequency: "Daily", reminderTime: "20:30", startDate: "2026-01-01", endDate: "2026-12-31", notes: "After dinner" },
            { id: "med3", userId: currentUser.id, name: "Vitamin D3", dosage: "2000 IU", frequency: "Weekly", reminderTime: "09:15", startDate: "2026-06-01", endDate: "2026-12-31", notes: "Weekly every Monday" }
          ];
          saveMedicines([...meds, ...sampleMeds]);
        }
        let health = getHealthRecords();
        if (health.filter(r => r.userId === currentUser.id).length === 0) {
          let today = new Date().toISOString().slice(0,10);
          let records = [
            { id: "h1", userId: currentUser.id, weight: 68, bloodPressure: "118/76", sugarLevel: 96, heartRate: 72, waterIntake: 5.5, bmi: 22.4, recordDate: today },
            { id: "h2", userId: currentUser.id, weight: 68.5, bloodPressure: "120/78", sugarLevel: 98, heartRate: 74, waterIntake: 6, bmi: 22.6, recordDate: "2026-06-02" }
          ];
          saveHealthRecords([...health, ...records]);
        }
      }
    }

    function sendNotification(title, body) {
      if (Notification.permission === "granted") new Notification(title, { body, icon: "https://cdn-icons-png.flaticon.com/512/2966/2966327.png" });
      else if (Notification.permission !== "denied") Notification.requestPermission().then(perm => { if(perm==="granted") new Notification(title,{body}); });
    }

    function getUpcomingMeds() {
      if (!currentUser) return [];
      const meds = getMedicines().filter(m => m.userId === currentUser.id);
      const today = new Date().toISOString().slice(0,10);
      return meds.filter(m => m.endDate >= today && m.startDate <= today).sort((a,b)=> a.reminderTime.localeCompare(b.reminderTime));
    }
    function getMissedMeds() {
      if (!currentUser) return [];
      const meds = getMedicines().filter(m => m.userId === currentUser.id);
      const today = new Date().toISOString().slice(0,10);
      const now = new Date();
      const currentHourMin = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
      return meds.filter(med => {
        if (med.endDate < today || med.startDate > today) return false;
        const logs = getMedicineLogs();
        const takenToday = logs.some(l => l.medicineId === med.id && l.date === today && l.taken === true);
        return (!takenToday && med.reminderTime <= currentHourMin);
      });
    }
    function getCompliancePercent() {
      const meds = getMedicines().filter(m => m.userId === currentUser.id);
      if (!meds.length) return 100;
      let expected=0, taken=0;
      const today = new Date().toISOString().slice(0,10);
      const startDate = new Date(Date.now() - 7*86400000).toISOString().slice(0,10);
      const logs = getMedicineLogs();
      meds.forEach(med => {
        let cursor = new Date(startDate);
        let endLoop = new Date(today);
        while (cursor <= endLoop) {
          let dateStr = cursor.toISOString().slice(0,10);
          if (dateStr >= med.startDate && dateStr <= med.endDate) {
            expected++;
            if (logs.some(l => l.medicineId === med.id && l.date === dateStr && l.taken)) taken++;
          }
          cursor.setDate(cursor.getDate()+1);
        }
      });
      return expected === 0 ? 100 : Math.round((taken/expected)*100);
    }
    function markDoseTaken(medicineId) {
      const today = new Date().toISOString().slice(0,10);
      let logs = getMedicineLogs();
      const existing = logs.find(l => l.medicineId === medicineId && l.date === today);
      if(existing) existing.taken = true;
      else logs.push({ medicineId, date: today, taken: true });
      saveMedicineLogs(logs);
      renderCurrentSection();
      sendNotification("✅ Dose Recorded", "Medicine marked as taken! Great job.");
    }
    function computeBMI(weightKg, heightCm=165) { return (weightKg / ((heightCm/100)**2)).toFixed(1); }

    // ----------------------------- AUTH UI (Dark & Colorful) ---------------------------------
    function renderAuthScreen() {
      document.getElementById("appRoot").innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-5">
          <div class="glass-card w-full max-w-md p-8 rounded-3xl shadow-2xl">
            <div class="text-center mb-6">
              <div class="inline-flex p-3 bg-gradient-to-br from-cyan-500 to-blue-700 rounded-2xl shadow-lg"><i class="fas fa-heartbeat text-4xl text-white"></i></div>
              <h1 class="text-4xl font-extrabold mt-3 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">MediTrack</h1>
              <p class="text-cyan-300 mt-1">Your 24/7 health companion</p>
            </div>
            <div id="authTabs" class="flex gap-2 mb-6 bg-gray-800/50 p-1 rounded-full">
              <button id="showLoginBtn" class="flex-1 py-2 font-bold rounded-full transition-all bg-cyan-600 shadow text-white">Login</button>
              <button id="showRegBtn" class="flex-1 py-2 font-medium rounded-full transition-all text-cyan-300">Register</button>
            </div>
            <div id="authFormContainer"></div>
            <div class="text-center mt-5"><a href="#" id="forgotPwdLink" class="text-sm text-cyan-400 hover:underline">Forgot Password?</a></div>
          </div>
        </div>`;
      const loginHtml = `<form id="loginForm"><div class="mb-4"><i class="fas fa-envelope text-cyan-400 mr-2"></i><input type="email" id="loginEmail" placeholder="Email address" class="w-full rounded-xl focus:ring-2 focus:ring-cyan-400 outline-none"></div><div class="mb-5"><i class="fas fa-lock text-cyan-400 mr-2"></i><input type="password" id="loginPass" placeholder="Password" class="w-full rounded-xl focus:ring-2 focus:ring-cyan-400"></div><button type="submit" class="btn-primary w-full text-white py-3 rounded-xl font-bold text-lg transition"><i class="fas fa-arrow-right-to-bracket mr-2"></i>Sign In</button></form>`;
      const regHtml = `<form id="regForm"><div class="mb-3"><i class="fas fa-user text-cyan-400"></i><input type="text" id="regName" placeholder="Full Name" class="w-full rounded-xl"></div><div class="mb-3"><i class="fas fa-envelope text-cyan-400"></i><input type="email" id="regEmail" placeholder="Email" class="w-full rounded-xl"></div><div class="mb-5"><i class="fas fa-key text-cyan-400"></i><input type="password" id="regPass" placeholder="Password (min 6 chars)" class="w-full rounded-xl"></div><button type="submit" class="btn-primary w-full text-white py-3 rounded-xl font-bold">Create Account <i class="fas fa-user-plus ml-2"></i></button></form>`;
      document.getElementById("authFormContainer").innerHTML = loginHtml;
      document.getElementById("showLoginBtn").onclick = () => { document.getElementById("authFormContainer").innerHTML = loginHtml; bindLogin(); toggleActiveTab('login'); };
      document.getElementById("showRegBtn").onclick = () => { document.getElementById("authFormContainer").innerHTML = regHtml; bindRegister(); toggleActiveTab('reg'); };
      document.getElementById("forgotPwdLink").onclick = (e) => { e.preventDefault(); const email = prompt("Enter registered email:"); if(email && getUsers().find(u=>u.email===email)) alert("Password reset link sent (demo). Use 'demo123' for demo account."); else alert("Email not found."); };
      function toggleActiveTab(active) { 
        const loginBtn = document.getElementById("showLoginBtn"); const regBtn = document.getElementById("showRegBtn");
        if(active==='login'){ loginBtn.className="flex-1 py-2 font-bold rounded-full bg-cyan-600 shadow text-white"; regBtn.className="flex-1 py-2 font-medium rounded-full text-cyan-300"; }
        else { regBtn.className="flex-1 py-2 font-bold rounded-full bg-cyan-600 shadow text-white"; loginBtn.className="flex-1 py-2 font-medium rounded-full text-cyan-300"; }
      }
      bindLogin(); bindRegister();
    }
    function bindLogin() {
      const form = document.getElementById("loginForm");
      if(form) form.onsubmit = (e) => { e.preventDefault(); const email = document.getElementById("loginEmail").value; const pwd = document.getElementById("loginPass").value; const users = getUsers(); const user = users.find(u => u.email === email && u.password === hashPassword(pwd)); if(user) { currentUser = user; localStorage.setItem("meditrack_session_dark", JSON.stringify({id: user.id, email: user.email, name: user.name})); seedDemoData(); renderMainApp(); } else alert("Invalid credentials. Try demo@meditrack.com / demo123"); };
    }
    function bindRegister() {
      const form = document.getElementById("regForm");
      if(form) form.onsubmit = (e) => { e.preventDefault(); const name = document.getElementById("regName").value; const email = document.getElementById("regEmail").value; const pwd = document.getElementById("regPass").value; if(pwd.length<4) { alert("Password too short"); return; } const users = getUsers(); if(users.find(u=>u.email===email)) alert("Email already exists"); else { const newUser = { id: "u"+Date.now(), name, email, password: hashPassword(pwd), profilePic: null, createdAt: new Date().toISOString() }; users.push(newUser); saveUsers(users); alert("Registered! Please login."); renderAuthScreen(); } };
    }
    // ----------------------------- MAIN APP (Dark) ---------------------------------
    function renderMainApp() {
      document.getElementById("appRoot").innerHTML = `
        <div class="flex flex-col lg:flex-row min-h-screen p-4 gap-4">
          <aside class="lg:w-80 glass-card p-5 rounded-3xl shadow-xl">
            <div class="flex items-center justify-between mb-8">
              <div class="flex items-center gap-2"><i class="fas fa-capsules text-3xl text-cyan-400"></i><span class="text-2xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">MediTrack</span></div>
              <button id="lightModeToggle" class="text-2xl p-2 rounded-full hover:bg-cyan-900/50"><i class="fas fa-sun text-amber-400"></i></button>
            </div>
            <div class="flex items-center gap-4 mb-8 pb-5 border-b border-cyan-800">
              <img id="profileAvatar" src="${currentUser.profilePic || `https://ui-avatars.com/api/?background=0b3b5b&color=fff&bold=true&size=48&name=${encodeURIComponent(currentUser.name)}`}" class="w-14 h-14 rounded-2xl object-cover shadow-md">
              <div><p class="font-bold text-lg text-cyan-300">${currentUser.name}</p><p class="text-xs text-gray-400">${currentUser.email}</p></div>
            </div>
            <nav class="space-y-2">${["dashboard","medicines","health","reports","profile"].map(section=>`<div data-section="${section}" class="sidebar-item flex items-center gap-4 p-3 cursor-pointer font-medium"><i class="fas ${section==='dashboard'?'fa-chart-pie':section==='medicines'?'fa-tablets':section==='health'?'fa-heart-pulse':section==='reports'?'fa-chart-simple':'fa-user-astronaut'} w-6 text-cyan-400"></i><span class="capitalize text-base">${section}</span></div>`).join('')}</nav>
            <button id="logoutBtn" class="mt-10 w-full bg-gradient-to-r from-rose-500/20 to-rose-600/20 text-rose-300 p-3 rounded-2xl font-semibold hover:bg-rose-500/30 transition"><i class="fas fa-sign-out-alt mr-2"></i>Logout</button>
          </aside>
          <main class="flex-1 p-4 rounded-3xl" id="mainContent"></main>
        </div>
        <div id="chatbotRoot"></div>
      `;
      document.getElementById("lightModeToggle").onclick = () => {
        // Toggle to light mode? User wants no white, so we just keep dark. But we can add a proper dark/light toggle that respects no-white.
        // For simplicity, we'll ignore light mode toggle or just show message.
        alert("Dark mode only - no white backgrounds as requested!");
      };
      document.querySelectorAll("[data-section]").forEach(el => el.addEventListener("click", () => { activeSection = el.dataset.section; renderCurrentSection(); }));
      document.getElementById("logoutBtn").onclick = () => { currentUser = null; localStorage.removeItem("meditrack_session_dark"); renderAuthScreen(); };
      renderCurrentSection();
      initChatbotDark();
      setInterval(() => { if(currentUser) checkMissedReminderAndAlert(); }, 60000);
      checkMissedReminderAndAlert();
    }
    function checkMissedReminderAndAlert() {
      if(!currentUser) return;
      const missed = getMissedMeds();
      if(missed.length) sendNotification("⚠️ Missed Doses", `You have ${missed.length} medicine dose(s) not taken.`);
      const upcoming = getUpcomingMeds();
      const now = new Date();
      const currTime = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
      upcoming.forEach(med => { if(med.reminderTime === currTime && !getMedicineLogs().some(l=>l.medicineId===med.id && l.date===new Date().toISOString().slice(0,10))) sendNotification("💊 Reminder", `Time for ${med.name} (${med.dosage})`); });
    }
    function renderCurrentSection() {
      if(activeSection === "dashboard") renderDashboardDark();
      else if(activeSection === "medicines") renderMedicinesDark();
      else if(activeSection === "health") renderHealthDark();
      else if(activeSection === "reports") renderReportsDark();
      else if(activeSection === "profile") renderProfileDark();
    }
    // Dashboard
    function renderDashboardDark() {
      const upcoming = getUpcomingMeds().slice(0,4);
      const missed = getMissedMeds();
      const compliance = getCompliancePercent();
      const records = getHealthRecords().filter(r=>r.userId===currentUser.id).sort((a,b)=>b.recordDate.localeCompare(a.recordDate));
      const latest = records[0] || { waterIntake:0, bloodPressure:"120/80", sugarLevel:0, heartRate:0, weight:0 };
      document.getElementById("mainContent").innerHTML = `
        <div>
          <h1 class="text-3xl font-bold mb-2 text-cyan-300">Welcome back, ${currentUser.name.split(' ')[0]}! 👋</h1>
          <p class="text-gray-400 mb-6">Stay consistent, stay healthy.</p>
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
            <div class="glass-card p-5 card-hover bg-gradient-to-br from-cyan-900/30 to-blue-900/30"><i class="fas fa-calendar-check text-3xl text-emerald-400"></i><p class="text-lg font-bold mt-2">Compliance</p><p class="text-4xl font-black text-cyan-300">${compliance}%</p><div class="w-full bg-gray-700 rounded-full mt-2 h-2"><div class="bg-gradient-to-r from-emerald-400 to-cyan-500 h-2 rounded-full" style="width:${compliance}%"></div></div></div>
            <div class="glass-card p-5 card-hover bg-gradient-to-br from-sky-900/30 to-indigo-900/30"><i class="fas fa-tint text-3xl text-sky-400"></i><p class="font-bold">Water Intake</p><p class="text-3xl font-black text-sky-300">${latest.waterIntake||0}<span class="text-base">/8 cups</span></p><button id="addWaterQuick" class="mt-2 text-sm bg-sky-800/50 px-3 py-1 rounded-full text-sky-300"><i class="fas fa-plus-circle"></i> +1 cup</button></div>
            <div class="glass-card p-5 card-hover bg-gradient-to-br from-rose-900/30 to-pink-900/30"><i class="fas fa-heartbeat text-3xl text-rose-400"></i><p class="font-bold">Health Snapshot</p><p>❤️ ${latest.heartRate||"--"} bpm &nbsp; 🩸 ${latest.bloodPressure||"--"}</p><p>⚖️ ${latest.weight||"--"} kg &nbsp; 🩸 Sugar: ${latest.sugarLevel||"--"}</p></div>
            <div class="glass-card p-5 card-hover bg-gradient-to-br from-amber-900/30 to-orange-900/30"><i class="fas fa-chart-line text-3xl text-amber-400"></i><p class="font-bold">Weekly Goal</p><p class="text-xl">Medicines taken <span class="font-black text-amber-300">${compliance}%</span></p></div>
          </div>
          <div class="grid md:grid-cols-2 gap-6 mt-7">
            <div class="glass-card p-5"><h3 class="font-bold text-xl flex gap-2 text-cyan-300"><i class="fas fa-list-ul text-cyan-400"></i> Today's Schedule</h3><ul class="mt-3 space-y-2">${upcoming.map(m=>`<li class="flex justify-between items-center p-2 border-b border-cyan-800"><span><b>${m.name}</b> ${m.dosage} at ${m.reminderTime}</span><button onclick="window.markDoseTaken('${m.id}')" class="bg-emerald-600/50 text-emerald-300 px-3 py-1 rounded-full text-sm"><i class="fas fa-check"></i> Taken</button></li>`).join('')||"<li class='text-gray-400'>No medicines for today 🎉</li>"}</ul></div>
            <div class="glass-card p-5"><h3 class="font-bold text-xl flex gap-2 text-amber-300"><i class="fas fa-exclamation-triangle text-amber-400"></i> Missed Doses</h3><ul>${missed.map(m=>`<li class="py-2 flex items-center gap-2"><i class="fas fa-clock text-rose-400"></i> ${m.name} (${m.dosage}) at ${m.reminderTime}</li>`).join('')||"<li class='text-emerald-400'>All caught up! Perfect.</li>"}</ul></div>
          </div>
          <div class="mt-7 glass-card p-4"><canvas id="healthTrendChart" height="90"></canvas></div>
        </div>`;
      document.getElementById("addWaterQuick")?.addEventListener("click", () => {
        let logs = getHealthRecords(); let today = new Date().toISOString().slice(0,10);
        let existing = logs.find(l=>l.userId===currentUser.id && l.recordDate===today);
        if(existing) existing.waterIntake = (existing.waterIntake||0)+1;
        else logs.push({ id:"h"+Date.now(), userId:currentUser.id, weight:0, bloodPressure:"120/80", sugarLevel:100, heartRate:72, waterIntake:1, bmi:0, recordDate:today });
        saveHealthRecords(logs); renderCurrentSection();
      });
      const ctx = document.getElementById('healthTrendChart')?.getContext('2d');
      let healthData = getHealthRecords().filter(r=>r.userId===currentUser.id).slice(-7);
      if(healthChart) healthChart.destroy();
      if(ctx) healthChart = new Chart(ctx, { type:'line', data:{ labels:healthData.map(d=>d.recordDate.slice(5)), datasets:[{label:'Weight (kg)', data:healthData.map(d=>d.weight), borderColor:'#00b4d8', tension:0.3},{label:'Heart Rate', data:healthData.map(d=>d.heartRate), borderColor:'#f43f5e', tension:0.3}] } });
      window.markDoseTaken = markDoseTaken;
    }
    function renderMedicinesDark() {
      let meds = getMedicines().filter(m=>m.userId===currentUser.id);
      document.getElementById("mainContent").innerHTML = `<div class="flex flex-wrap justify-between items-center mb-6"><h2 class="text-3xl font-bold text-cyan-300"><i class="fas fa-pills text-cyan-400 mr-2"></i>My Medications</h2><button id="addMedicineBtn" class="btn-primary text-white px-5 py-2 rounded-2xl"><i class="fas fa-plus mr-2"></i>Add New</button></div>
      <div class="grid gap-5 md:grid-cols-2">${meds.map(m=>`<div class="glass-card p-5 card-hover"><div class="flex justify-between"><div><h3 class="text-xl font-bold text-cyan-300">${m.name}</h3><p class="text-sm text-gray-400">${m.dosage} · ${m.frequency}</p><p><i class="far fa-clock text-cyan-400"></i> ${m.reminderTime}</p><p class="text-xs">${m.startDate} → ${m.endDate}</p><p class="text-xs italic">📝 ${m.notes||"No notes"}</p></div><div><button onclick="window.editMedicine('${m.id}')" class="text-cyan-400 p-2"><i class="fas fa-edit fa-lg"></i></button><button onclick="window.deleteMedicine('${m.id}')" class="text-rose-400 p-2"><i class="fas fa-trash-alt fa-lg"></i></button><button onclick="window.markDoseTaken('${m.id}')" class="block mt-2 bg-emerald-800/50 px-3 py-1 rounded-full text-sm text-emerald-300"><i class="fas fa-check-circle"></i> Take</button></div></div></div>`).join('')||"<div class='glass-card p-8 text-center text-gray-400'>No medicines added. Click +Add New</div>"}</div>`;
      document.getElementById("addMedicineBtn").onclick = () => openMedicineModal();
      window.editMedicine = (id) => openMedicineModal(id);
      window.deleteMedicine = (id) => { if(confirm("Delete permanently?")){ let medsUpd=getMedicines().filter(m=>!(m.userId===currentUser.id && m.id===id)); saveMedicines(medsUpd); renderCurrentSection(); } };
      window.markDoseTaken = markDoseTaken;
    }
    function openMedicineModal(editId=null) {
      let med = editId ? getMedicines().find(m=>m.id===editId) : null;
      const modalHtml = `<div id="modalOverlay" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4"><div class="glass-card w-full max-w-md p-6 rounded-3xl"><h3 class="text-2xl font-bold mb-4 text-cyan-300">${editId?"Edit Medicine":"Add Medicine"}</h3><input id="medName" placeholder="Medicine name" value="${med?.name||''}" class="w-full mb-3 rounded-xl"><input id="medDosage" placeholder="Dosage (e.g., 500mg)" value="${med?.dosage||''}" class="w-full mb-3 rounded-xl"><select id="medFreq" class="w-full mb-3 rounded-xl"><option ${med?.frequency==='Daily'?'selected':''}>Daily</option><option ${med?.frequency==='Weekly'?'selected':''}>Weekly</option><option ${med?.frequency==='Monthly'?'selected':''}>Monthly</option></select><input id="medTime" type="time" value="${med?.reminderTime||'09:00'}" class="w-full mb-3 rounded-xl"><input id="startDate" type="date" value="${med?.startDate||new Date().toISOString().slice(0,10)}" class="w-full mb-3 rounded-xl"><input id="endDate" type="date" value="${med?.endDate||'2026-12-31'}" class="w-full mb-3 rounded-xl"><textarea id="medNotes" placeholder="Notes" class="w-full rounded-xl">${med?.notes||''}</textarea><div class="flex gap-3 mt-5"><button id="modalCancel" class="flex-1 p-2 rounded-xl border border-cyan-700">Cancel</button><button id="modalSave" class="flex-1 btn-primary text-white p-2 rounded-xl">Save</button></div></div></div>`;
      document.body.insertAdjacentHTML('beforeend', modalHtml);
      document.getElementById("modalSave").onclick = () => {
        let newMed = { id: editId || "m"+Date.now(), userId: currentUser.id, name: document.getElementById("medName").value, dosage: document.getElementById("medDosage").value, frequency: document.getElementById("medFreq").value, reminderTime: document.getElementById("medTime").value, startDate: document.getElementById("startDate").value, endDate: document.getElementById("endDate").value, notes: document.getElementById("medNotes").value };
        let meds = getMedicines();
        if(editId) { let idx = meds.findIndex(m=>m.id===editId); if(idx!==-1) meds[idx]=newMed; } else meds.push(newMed);
        saveMedicines(meds);
        document.getElementById("modalOverlay").remove();
        renderCurrentSection();
      };
      document.getElementById("modalCancel").onclick = () => document.getElementById("modalOverlay").remove();
    }
    function renderHealthDark() {
      let records = getHealthRecords().filter(r=>r.userId===currentUser.id).sort((a,b)=>b.recordDate.localeCompare(a.recordDate));
      document.getElementById("mainContent").innerHTML = `<h2 class="text-3xl font-bold mb-4 text-cyan-300"><i class="fas fa-heartbeat text-rose-400 mr-2"></i>Health Tracker</h2><button id="addHealthBtn" class="btn-primary text-white px-6 py-2 rounded-2xl mb-6"><i class="fas fa-plus-circle"></i> Log Today's Metrics</button>
      <div class="grid md:grid-cols-2 gap-5"><div class="glass-card p-5"><h3 class="font-bold text-xl text-cyan-300">BMI Calculator</h3><input id="bmiWeight" type="number" placeholder="Weight (kg)" class="w-full rounded-xl mt-2"><button id="calcBmiBtn" class="mt-2 bg-cyan-700 text-white px-4 py-2 rounded-xl">Compute BMI</button><p id="bmiResult" class="mt-3 font-semibold text-cyan-300"></p></div><div class="glass-card p-5"><h3 class="font-bold text-xl text-sky-300">💧 Hydration Goal</h3><p class="text-gray-400">Log water daily to stay on track.</p></div></div>
      <div class="mt-6"><h3 class="font-bold text-2xl text-cyan-300">Health History</h3>${records.map(r=>`<div class="glass-card p-4 my-3 flex flex-wrap justify-between"><span><b class="text-cyan-300">${r.recordDate}</b> | ⚖️${r.weight}kg | ❤️${r.heartRate} | 💊${r.sugarLevel}</span><span class="text-gray-400">BP ${r.bloodPressure} | 💧${r.waterIntake}cups</span></div>`).join('')}</div>`;
      document.getElementById("addHealthBtn").onclick = () => {
        let today = new Date().toISOString().slice(0,10);
        let w = prompt("Weight (kg)"); let bp = prompt("Blood Pressure (e.g., 118/76)"); let sugar = prompt("Sugar Level (mg/dL)"); let hr = prompt("Heart Rate (bpm)"); let water = prompt("Water Intake (cups)");
        let bmiVal = computeBMI(parseFloat(w)||65, 165);
        let recordsUpd = getHealthRecords();
        recordsUpd.push({ id:"hr"+Date.now(), userId:currentUser.id, weight:parseFloat(w)||0, bloodPressure:bp||"120/80", sugarLevel:parseInt(sugar)||0, heartRate:parseInt(hr)||0, waterIntake:parseFloat(water)||0, bmi:parseFloat(bmiVal), recordDate:today });
        saveHealthRecords(recordsUpd); renderCurrentSection();
      };
      document.getElementById("calcBmiBtn").onclick = () => { let w = document.getElementById("bmiWeight").value; let bmi = computeBMI(parseFloat(w),165); document.getElementById("bmiResult").innerHTML = `Your BMI: ${bmi} ${bmi<18.5?"(Underweight)":bmi<25?"(Normal)":"(Overweight)"}`; };
    }
    function renderReportsDark() {
      const compliance = getCompliancePercent();
      document.getElementById("mainContent").innerHTML = `<h2 class="text-3xl font-bold text-cyan-300"><i class="fas fa-chart-line"></i> Health Reports</h2><div class="glass-card p-6 mt-4"><p class="text-xl text-cyan-300">📊 Weekly Adherence: ${compliance}%</p><button id="exportPdfBtn" class="btn-primary text-white px-6 py-2 rounded-2xl mt-3"><i class="fas fa-download"></i> Export PDF Report</button></div><canvas id="weeklyComplianceChart" height="100" class="mt-6"></canvas>`;
      setTimeout(()=>{
        const ctx2 = document.getElementById('weeklyComplianceChart')?.getContext('2d');
        if(ctx2 && complianceChart) complianceChart.destroy();
        if(ctx2) complianceChart = new Chart(ctx2, { type:'bar', data:{ labels:['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], datasets:[{label:'Compliance %', data:[88,92,85,94,compliance,90,compliance], backgroundColor:'#00b4d8', borderRadius:12}] } });
      },100);
      document.getElementById("exportPdfBtn")?.addEventListener("click", async () => { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.setTextColor(0,180,216); doc.text("MediTrack Health Summary", 20, 20); doc.text(`Medicine Compliance: ${compliance}%`,20,40); doc.save("MediTrack_Report.pdf"); });
    }
    function renderProfileDark() {
      document.getElementById("mainContent").innerHTML = `<div class="glass-card max-w-2xl p-8"><h2 class="text-3xl font-bold text-cyan-300">Profile Settings</h2><div class="flex flex-col items-center my-4"><img id="profileImg" src="${currentUser.profilePic || `https://ui-avatars.com/api/?background=0b3b5b&color=fff&bold=true&size=100&name=${encodeURIComponent(currentUser.name)}`}" class="w-28 h-28 rounded-3xl shadow-lg"><input type="file" id="uploadPic" accept="image/*" class="mt-3 text-sm text-gray-300"></div><label class="text-cyan-300">Full Name</label><input id="profileName" value="${currentUser.name}" class="w-full rounded-xl mt-1"><button id="updateProfileBtn" class="btn-primary text-white px-6 py-2 rounded-2xl mt-5 w-full">Update Profile</button></div>`;
      document.getElementById("uploadPic").onchange = (e) => { const file = e.target.files[0]; if(file){ const reader = new FileReader(); reader.onload = (ev) => { currentUser.profilePic = ev.target.result; const users = getUsers(); const idx = users.findIndex(u=>u.id===currentUser.id); if(idx!==-1) users[idx].profilePic = ev.target.result; saveUsers(users); renderCurrentSection(); }; reader.readAsDataURL(file); } };
      document.getElementById("updateProfileBtn").onclick = () => { let newName = document.getElementById("profileName").value; if(newName){ currentUser.name = newName; const users = getUsers(); const idx = users.findIndex(u=>u.id===currentUser.id); if(idx!==-1) users[idx].name = newName; saveUsers(users); renderCurrentSection(); } };
    }
    // AI chatbot
    function initChatbotDark() {
      const container = document.getElementById("chatbotRoot");
      container.innerHTML = `<button id="chatFloatBtn" class="floating-chat bg-gradient-to-r from-cyan-600 to-blue-700 text-white p-4 rounded-full shadow-2xl pulse"><i class="fas fa-robot text-2xl"></i></button>`;
      let isOpen = false; let win = null;
      document.getElementById("chatFloatBtn").onclick = () => { if(isOpen){ win?.remove(); isOpen=false; } else { createChat(); isOpen=true; } };
      function createChat(){
        win = document.createElement('div'); win.className = "chat-window";
        win.innerHTML = `<div class="p-4 bg-gradient-to-r from-cyan-700 to-blue-800 text-white flex justify-between items-center"><span><i class="fas fa-brain mr-2"></i> MediAI Assistant</span><button id="closeChatX"><i class="fas fa-times-circle text-xl"></i></button></div><div id="chatMsgs" class="flex-1 overflow-y-auto p-3 space-y-2"></div><div class="p-3 flex gap-2"><input id="chatInput" placeholder="Ask about meds, health..." class="flex-1 rounded-xl border border-cyan-700"><button id="chatSend" class="bg-cyan-600 text-white px-4 rounded-xl"><i class="fas fa-paper-plane"></i></button></div>`;
        document.body.appendChild(win);
        document.getElementById("closeChatX").onclick = () => { win.remove(); isOpen=false; };
        document.getElementById("chatSend").onclick = sendMsg;
        document.getElementById("chatInput").addEventListener("keypress", (e) => e.key==="Enter" && sendMsg());
        function sendMsg(){
          let input = document.getElementById("chatInput"); let msg = input.value.trim(); if(!msg) return;
          addMsg("user", msg); input.value="";
          let reply = "🧠 Hello! ";
          const meds = currentUser ? getMedicines().filter(m=>m.userId===currentUser.id) : [];
          if(msg.toLowerCase().includes("schedule")) reply += `Your medicines: ${meds.map(m=>m.name).join(", ") || "none added yet."}`;
          else if(msg.toLowerCase().includes("water")) reply += "Aim for 8 glasses of water daily. Stay hydrated!";
          else if(msg.toLowerCase().includes("bmi")) reply += "BMI = weight(kg) / (height(m)²). Healthy range: 18.5–24.9.";
          else if(msg.toLowerCase().includes("reminder")) reply += "I'll remind you at your medicine times!";
          else reply += "Take medications on time, track BP weekly, and maintain a balanced lifestyle. I'm here for you!";
          setTimeout(() => addMsg("bot", reply), 300);
        }
        function addMsg(sender, text){
          let containerDiv = document.getElementById("chatMsgs");
          let div = document.createElement("div"); div.className = sender === "user" ? "text-right" : "text-left";
          div.innerHTML = `<span class="inline-block p-2 rounded-2xl ${sender==="user"?"bg-cyan-600 text-white":"bg-gray-800 text-gray-200"} max-w-[85%]">${text}</span>`;
          containerDiv.appendChild(div); containerDiv.scrollTop = containerDiv.scrollHeight;
        }
      }
    }
    // session start
    (function initSession() {
      const session = localStorage.getItem("meditrack_session_dark");
      if(session) {
        try{ const s = JSON.parse(session); const users = getUsers(); const found = users.find(u=>u.id===s.id); if(found) { currentUser = found; seedDemoData(); renderMainApp(); } else renderAuthScreen(); } catch(e){ renderAuthScreen(); }
      } else renderAuthScreen();
      if(Notification.permission !== "granted") Notification.requestPermission();
    })();
  </script>
</body>
</html>
